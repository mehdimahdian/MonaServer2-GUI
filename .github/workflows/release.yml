name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ── Build & embed the React web UI ─────────────────────────────────────────
  build-webui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: webui/pnpm-lock.yaml

      - name: Install & Build Web UI
        working-directory: webui
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - uses: actions/upload-artifact@v4
        with:
          name: webui-dist
          path: src/MonaServer2.Service/wwwroot/

  # ── Windows x64: publish → sign → build installer ──────────────────────────
  publish-windows:
    needs: build-webui
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Download web UI
        uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: src/MonaServer2.Service/wwwroot/

      - name: Generate app icon
        shell: pwsh
        run: powershell -File installer\windows\Generate-Icon.ps1

      - name: Publish Service
        run: |
          dotnet publish src/MonaServer2.Service `
            -r win-x64 -c Release `
            --self-contained true `
            -p:PublishSingleFile=true `
            -o publish/win-x64/service

      - name: Publish Desktop
        run: |
          dotnet publish src/MonaServer2.Desktop `
            -r win-x64 -c Release `
            --self-contained true `
            -p:PublishSingleFile=true `
            -o publish/win-x64/desktop

      # ── Code Signing ─────────────────────────────────────────────────────
      # Steps below are conditional — they run only when the certificate
      # secrets are configured in the repository settings.
      # To add signing: Settings → Secrets → CERTIFICATE_PFX_BASE64 + CERTIFICATE_PFX_PASSWORD
      - name: Decode certificate
        if: ${{ secrets.CERTIFICATE_PFX_BASE64 != '' }}
        shell: pwsh
        run: |
          $pfx = [Convert]::FromBase64String('${{ secrets.CERTIFICATE_PFX_BASE64 }}')
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\codesign.pfx", $pfx)

      - name: Sign Service
        if: ${{ secrets.CERTIFICATE_PFX_BASE64 != '' }}
        shell: pwsh
        run: |
          powershell -File installer\windows\Sign-Binaries.ps1 `
            -PublishDir publish\win-x64\service `
            -CertPfxPath "$env:RUNNER_TEMP\codesign.pfx" `
            -CertPassword '${{ secrets.CERTIFICATE_PFX_PASSWORD }}'

      - name: Sign Desktop
        if: ${{ secrets.CERTIFICATE_PFX_BASE64 != '' }}
        shell: pwsh
        run: |
          powershell -File installer\windows\Sign-Binaries.ps1 `
            -PublishDir publish\win-x64\desktop `
            -CertPfxPath "$env:RUNNER_TEMP\codesign.pfx" `
            -CertPassword '${{ secrets.CERTIFICATE_PFX_PASSWORD }}'

      # ── Build Inno Setup installer ───────────────────────────────────────
      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Create output directory
        run: New-Item -ItemType Directory -Force -Path dist\installer

      - name: Build installer
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}' -replace '^v', ''
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion=$version `
            installer\windows\MonaServer2-GUI.iss
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup build failed" }

      - name: Sign installer
        if: ${{ secrets.CERTIFICATE_PFX_BASE64 != '' }}
        shell: pwsh
        run: |
          powershell -File installer\windows\Sign-Binaries.ps1 `
            -PublishDir dist\installer `
            -CertPfxPath "$env:RUNNER_TEMP\codesign.pfx" `
            -CertPassword '${{ secrets.CERTIFICATE_PFX_PASSWORD }}'

      # ── Package portable zip ─────────────────────────────────────────────
      - name: Package portable zip
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}' -replace '^v', ''
          Compress-Archive `
            -Path publish\win-x64\service, publish\win-x64\desktop `
            -DestinationPath "MonaServer2-GUI-$version-win-x64.zip"

      - name: Stage installer for upload
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}' -replace '^v', ''
          $src = Get-ChildItem dist\installer\*-Setup.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($src) {
            Copy-Item $src.FullName "MonaServer2-GUI-$version-win-x64-Setup.exe"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: release-win-x64
          path: |
            MonaServer2-GUI-*-win-x64.zip
            MonaServer2-GUI-*-win-x64-Setup.exe

  # ── Linux x64 ──────────────────────────────────────────────────────────────
  publish-linux:
    needs: build-webui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Download web UI
        uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: src/MonaServer2.Service/wwwroot/

      - name: Publish Service
        run: |
          dotnet publish src/MonaServer2.Service \
            -r linux-x64 -c Release \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o publish/linux-x64/service

      - name: Publish Desktop
        run: |
          dotnet publish src/MonaServer2.Desktop \
            -r linux-x64 -c Release \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o publish/linux-x64/desktop

      - name: Package
        run: |
          VERSION="${{ github.ref_name }}"; VERSION="${VERSION#v}"
          tar -czf "MonaServer2-GUI-${VERSION}-linux-x64.tar.gz" -C publish/linux-x64 .

      - uses: actions/upload-artifact@v4
        with:
          name: release-linux-x64
          path: MonaServer2-GUI-*-linux-x64.tar.gz

  # ── macOS ARM64 ─────────────────────────────────────────────────────────────
  publish-macos:
    needs: build-webui
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Download web UI
        uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: src/MonaServer2.Service/wwwroot/

      - name: Publish Service
        run: |
          dotnet publish src/MonaServer2.Service \
            -r osx-arm64 -c Release \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o publish/osx-arm64/service

      - name: Publish Desktop
        run: |
          dotnet publish src/MonaServer2.Desktop \
            -r osx-arm64 -c Release \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o publish/osx-arm64/desktop

      - name: Package
        run: |
          VERSION="${{ github.ref_name }}"; VERSION="${VERSION#v}"
          tar -czf "MonaServer2-GUI-${VERSION}-osx-arm64.tar.gz" -C publish/osx-arm64 .

      - uses: actions/upload-artifact@v4
        with:
          name: release-osx-arm64
          path: MonaServer2-GUI-*-osx-arm64.tar.gz

  # ── Publish GitHub Release ───────────────────────────────────────────────────
  create-release:
    needs: [publish-windows, publish-linux, publish-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          body: |
            ## MonaServer2 GUI ${{ github.ref_name }}

            **Author:** Mehdi Mahdian — [m.mahdian@gmail.com](mailto:m.mahdian@gmail.com)

            Powered by [MonaServer2](https://github.com/MonaSolutions/MonaServer2) (MonaSolutions / Haivision) — GPL-3.0

            See [CHANGELOG.md](CHANGELOG.md) for full details.

            ---

            ### Windows Installation

            **Recommended — Installer (full install with service + shortcuts):**
            ```
            MonaServer2-GUI-*-win-x64-Setup.exe
            ```
            - Installs and auto-starts the companion Windows Service
            - Creates Start Menu folder and optional Desktop shortcut
            - Registers the uninstaller in Programs & Features
            - Executables are code-signed

            **Portable — no install required:**
            ```
            MonaServer2-GUI-*-win-x64.zip
            ```

            ### Linux / macOS

            | Platform | File |
            |---|---|
            | Linux x64 | `MonaServer2-GUI-*-linux-x64.tar.gz` |
            | macOS ARM64 | `MonaServer2-GUI-*-osx-arm64.tar.gz` |

            ### OBS Studio Plugin (`obs-mona-live`)

            The OBS plugin source is in `obs-plugin/`. After installing the app, open
            **OBS Plugin** in the sidebar and click **Install Plugin** for one-click setup.
